name: Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'src/**'
      - 'docs/**'
      - 'website/**'
      - 'spec/**'
      - 'conformance/coverage.md'
      - 'conformance/runner-protocol.md'
      - 'conformance/DASHBOARD.md'
      - 'conformance/README.md'
      - 'conformance/AUTHORING.md'
      - 'README.md'
      - 'README.ko.md'
      - 'PORTERS_GUIDE.md'
      - 'IMPLEMENTATIONS.md'
      - 'CONTRIBUTING.md'
      - 'RELEASING.md'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.build.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: mkdir -p site/dist && cp -R dist/. site/dist/
      # Build the Docusaurus docs site and mount it under /docs/.
      # The hand-written landing page in site/ stays at the root.
      - run: npm run docs:build
      - run: mkdir -p site/docs && cp -R website/build/. site/docs/
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4

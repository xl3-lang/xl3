name: Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'src/**'
      - 'docs/**'
      - 'website/**'
      - 'spec/**'
      - 'conformance/coverage.md'
      - 'conformance/runner-protocol.md'
      - 'conformance/DASHBOARD.md'
      - 'conformance/README.md'
      - 'conformance/AUTHORING.md'
      - 'README.md'
      - 'README.ko.md'
      - 'PORTERS_GUIDE.md'
      - 'IMPLEMENTATIONS.md'
      - 'CONTRIBUTING.md'
      - 'RELEASING.md'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.build.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the Docusaurus sitemap plugin (lastmod: 'date')
          # can read git last-modified dates for every page.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      # Build the Docusaurus docs site at the root. The /converter page
      # imports the local dist via a webpack alias, so dist must exist
      # before docs:build runs (build step above produces it).
      - run: npm run docs:build
      - run: cp -R website/build/. site/
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
      # Ping IndexNow (Bing/Naver/Seznam/Yandex) with every sitemap URL
      # so changed pages are re-crawled right away. Only after a
      # successful deploy — submitting URLs the CDN doesn't serve yet
      # would get them crawled as 404s.
      - run: node website/scripts/indexnow-submit.mjs

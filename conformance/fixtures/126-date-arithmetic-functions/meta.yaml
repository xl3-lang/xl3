description: YEAR / MONTH / EOMONTH / EDATE accept dates and return UTC-anchored components or dates (ADR-0019 amendment). EOMONTH(date, 0) returns the last day of the input month; EDATE(2026-01-31, 1) clamps to 2026-02-28 when the target month is shorter.
